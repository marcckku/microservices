application:
  name: user-service #serviceId o chiave di registrazione
  title: User Service
  version: 1.0.0

server:
  port: 0 # 8081 . Zero means random port
  servlet:
    context-path: /user-service # New Url "host:port/user-service" used from gateway to routing request to this service
  instance:
    hostname: localhost

spring:
  application:
    name: user-service  #name of the application
    version: 1.0.0
  main:
    banner-mode: "console"
    log-startup-info: true
  banner:
    location: classpath:banner.md
  output:
    ansi:
      enabled: always
  profiles:
    active: development

  datasource: #Database configuration
    url:
    username:
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa: #JPA configuration
    hibernate:
      ddl-auto: update #update the schema
    show-sql: true #show SQL queries
    open-in-view: false
    properties:
      dialect: org.hibernate.dialect.MySQLDialect
      hibernate:
        format_sql: true
        use_sql_comments: true
        highlight_sql: true

  jackson:
    serialization.indent_output: true
  messages:
    cache-duration: PT1S # 1 second, see the ISO 8601 standard

logging:  #logging configuration
  level:
    com.example: INFO
    org.springframework.web: INFO
    org.hibernate: ERROR
    org.hibernate.orm.jdbc.bind: TRACE #vedo anche i parametri passati nelle query

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/ #reference URL to registry on Eureka server
  instance:
    prefer-ip-address: true
    #instance-id: ${spring.application.name} #instance ID

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: info,health  # "*" #expose all endpoints
  endpoint: #Actuator endpoints configuration
    health:
      show-details: always #show details of the health endpoint