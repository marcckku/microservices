<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Management</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-4">
        <h1 class="text-3xl font-bold mb-4">Order Management</h1>
        <div class="bg-white p-4 rounded shadow-md">
            <h2 class="text-2xl font-semibold mb-4">Create Order</h2>
            <form id="orderForm" class="space-y-4">
                <div>
                    <label for="userId" class="block text-sm font-medium text-gray-700">User ID</label>
                    <input type="text" id="userId" name="userId" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                </div>
                <div>
                    <label for="product" class="block text-sm font-medium text-gray-700">Product</label>
                    <input type="text" id="product" name="product" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                </div>
                <div>
                    <label for="quantity" class="block text-sm font-medium text-gray-700">Quantity</label>
                    <input type="number" id="quantity" name="quantity" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                </div>
                <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded-md">Create Order</button>
            </form>
        </div>
        <div class="bg-white p-4 rounded shadow-md mt-6">
            <h2 class="text-2xl font-semibold mb-4">Order List</h2>
            <table class="min-w-full bg-white">
                <thead>
                    <tr>
                        <th class="py-2">Order ID</th>
                        <th class="py-2">User ID</th>
                        <th class="py-2">Product</th>
                        <th class="py-2">Quantity</th>
                        <th class="py-2">Actions</th>
                    </tr>
                </thead>
                <tbody id="orderList">
                    <!-- Order rows will be added here dynamically -->
                </tbody>
            </table>
        </div>
    </div>
    <script>
        // JavaScript to handle form submission and order list rendering
    </script>
</body>
</html>
