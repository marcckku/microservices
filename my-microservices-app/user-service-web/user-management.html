<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
<div class="container mx-auto p-4">
    <h1 class="text-3xl font-bold mb-4">User Management</h1>
    <div class="bg-white p-4 rounded shadow-md">
        <h2 class="text-2xl font-semibold mb-4">Register User</h2>
        <form id="userForm" class="space-y-4">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
                <input type="text" id="name" name="name" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
            </div>
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="email" name="email" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
            </div>
            <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded-md">Register</button>
        </form>
    </div>
    <div class="bg-white p-4 rounded shadow-md mt-6">
        <h2 class="text-2xl font-semibold mb-4">User List</h2>
        <table class="min-w-full bg-white">
            <thead>
            <tr>
                <th class="py-2">ID</th>
                <th class="py-2">Name</th>
                <th class="py-2">Email</th>
                <th class="py-2">Actions</th>
            </tr>
            </thead>
            <tbody id="userList">
            <!-- User rows will be added here dynamically -->
            </tbody>
        </table>
    </div>
</div>
<script>
    // JavaScript to handle form submission and user list rendering
</script>
</body>
</html>
