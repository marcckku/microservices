application:
  name: user-service #serviceId o chiave di registrazione
  title: User Service
  version: 1.0.0

server:
  port: 8081
  instance:
    hostname: localhost

spring:
  application:
    name: user-service  #name of the application
    version: 1.0.0
  main:
    banner-mode: "console"
    log-startup-info: true
  banner:
    location: classpath:banner.md
  output:
    ansi:
      enabled: always
  profiles:
    active: development

  datasource:
    url:
    username:
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa: #JPA configuration
    hibernate:
      ddl-auto: update #update the schema
    show-sql: true #show SQL queries

  logging:  #logging configuration
    level:
      org.springframework.web: INFO
      org.hibernate: ERROR

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/ #reference URL to registry on Eureka server
  instance:
    prefer-ip-address: true
   #instance-id: ${spring.application.name} #instance ID

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
